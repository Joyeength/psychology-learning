<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://accounts.google.com https://apis.google.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cdn.jsdelivr.net https://www.googleapis.com https://oauth2.googleapis.com https://accounts.google.com; img-src 'self' data: https://lh3.googleusercontent.com; frame-src https://accounts.google.com https://content.googleapis.com https://docs.google.com;" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- SEO & identity -->
  <title>100 Ngày Tâm Lý Học</title>
  <meta name="description" content="Khám phá tâm lý học qua 100 bài học ngắn hàng ngày — từ Freud đến flow state, từ trí nhớ đến hạnh phúc." />

  <!-- Open Graph (Facebook, Zalo, Messenger) -->
  <meta property="og:type"         content="website" />
  <meta property="og:title"        content="100 Ngày Tâm Lý Học" />
  <meta property="og:description"  content="Khám phá tâm lý học qua 100 bài học ngắn hàng ngày — từ Freud đến flow state, từ trí nhớ đến hạnh phúc." />
  <meta property="og:image"        content="https://joyeength.github.io/psychology-learning/og-image.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale"       content="vi_VN" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="100 Ngày Tâm Lý Học" />
  <meta name="twitter:description" content="Khám phá tâm lý học qua 100 bài học ngắn hàng ngày." />
  <meta name="twitter:image"       content="https://joyeength.github.io/psychology-learning/og-image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 1rem; background: #fafafa; color: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #e5e5e5; }
    }
    button { font-family: inherit; }
  </style>

  <!-- Load order:
       1. storage.js      — window.storage
       2. data.js         — window.MODULES_DEF, window.TOPICS, window.getModBase
       3. GIS CDN         — google.accounts.oauth2 (no SRI: dynamic content, Google policy)
       4. gapi CDN        — gapi + google.picker (no SRI: dynamic content, Google policy)
       5. GDriveSync.js   — window.GDriveSync (plain JS, initializes lazily on first connect)
       6. React CDN
       7. ReactDOM CDN
       8. Babel CDN
       9. DetailPanel.jsx  — icons, Block, DetailPanel → window globals
      10. JournalPanel.jsx — note textarea + checklist
      11. SettingsModal.jsx — OAuth UI
      12. psych_challenge_2.jsx — MODULES, PsychChallenge, createRoot render
  -->
  <script src="./storage.js"></script>
  <script src="./data.js"></script>

  <!-- Google Identity Services — no SRI (Google dynamically updates content at fixed URL) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google API client (for Picker) — no SRI (same reason) -->
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script src="./GDriveSync.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"
          integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"
          integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"
          integrity="sha384-AISI5AuDG6E8DeEiFMVB3rGQxhZt24OU0avMp+GMV64+tpnA3+Z6F5MT0f96iPva"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div style="padding:2rem;text-align:center;font-family:system-ui,sans-serif;color:#888;font-size:13px;">
      Đang tải...
    </div>
  </div>

  <!--
    Chạy local:  python3 -m http.server 8080
    Mở:          http://localhost:8080/
  -->
  <script type="text/babel" src="./DetailPanel.jsx"></script>
  <script type="text/babel" src="./JournalPanel.jsx"></script>
  <script type="text/babel" src="./SettingsModal.jsx"></script>
  <script type="text/babel" src="./psych_challenge_2.jsx"></script>
</body>
</html>
